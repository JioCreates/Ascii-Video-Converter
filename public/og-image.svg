<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- CRT scanline pattern -->
    <pattern id="scanlines" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="2" fill="rgba(0,0,0,0.15)"/>
      <rect y="2" width="1200" height="2" fill="transparent"/>
    </pattern>
    <!-- Phosphor glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stronger glow for title -->
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
    <!-- Screen inner glow -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#002200"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Screen glow -->
  <rect width="1200" height="630" fill="url(#screenGlow)"/>

  <!-- Terminal border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#0a3a0a" stroke-width="3" rx="4"/>
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#1a5a1a" stroke-width="1" rx="2"/>

  <!-- ASCII art face/figure on the left side - representing video-to-ASCII conversion -->
  <g filter="url(#glow)" opacity="0.35">
    <text x="80" y="120" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">                  @@@@@@@@@@                  </text>
    <text x="80" y="136" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">              @@@@%%######%%@@@@              </text>
    <text x="80" y="152" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">           @@@##**++====++**##@@@           </text>
    <text x="80" y="168" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">         @@##**++::::::::::++**##@@         </text>
    <text x="80" y="184" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">       @@##++::..          ..::++##@@       </text>
    <text x="80" y="200" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">      @@#++::    @@      @@    ::++#@@      </text>
    <text x="80" y="216" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">     @@#+::      @@      @@      ::+#@@     </text>
    <text x="80" y="232" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">    @@#+:.                        .:+#@@    </text>
    <text x="80" y="248" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">    @@#+:.        :::::::.        .:+#@@    </text>
    <text x="80" y="264" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">    @@#+:.       :++++++++:       .:+#@@    </text>
    <text x="80" y="280" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">     @@#+::       ::::::::      ::+#@@      </text>
    <text x="80" y="296" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">      @@#++::                  ::++#@@      </text>
    <text x="80" y="312" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">       @@##++::..          ..::++##@@       </text>
    <text x="80" y="328" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">         @@##**++::::::::::++**##@@         </text>
    <text x="80" y="344" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">           @@@##**++====++**##@@@           </text>
    <text x="80" y="360" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">              @@@@%%######%%@@@@              </text>
    <text x="80" y="376" fill="#33ff33" font-family="monospace" font-size="14" xml:space="preserve">                  @@@@@@@@@@                  </text>
  </g>

  <!-- Scattered ASCII characters in background -->
  <g opacity="0.08" fill="#33ff33" font-family="monospace" font-size="13">
    <text x="60" y="440">.*:;!=+*#%@ .::;;==++**##%%@@</text>
    <text x="60" y="456">.::++**##@@%%##**++::..  ..::+</text>
    <text x="60" y="472">@@##++::..          ..::++##@@</text>
    <text x="60" y="488">##**++====++**##  %%######%%@@</text>
    <text x="60" y="504">  @@@@@@@@@@    .*:;!=+*#%@ .</text>
    <text x="60" y="520">.::++**##@@%%##**++::..  ..::</text>
    <text x="60" y="536">@@##++::..          ..::++##@@</text>
    <text x="60" y="552"> .::;;==++**##%%@@ .*:;!=+*#%</text>
    <text x="550" y="440">+=+*#%@ .::;;==++**##%%@@  ::</text>
    <text x="550" y="456">##**++::..  ..::++**##@@%%##*</text>
    <text x="550" y="472">..          ..::++##@@  @@##*</text>
    <text x="550" y="488">====++**##  %%######%%@@  @@@@</text>
    <text x="550" y="504">@@@@    .*:;!=+*#%@  .::;;==+</text>
    <text x="550" y="520">**##@@%%##**++::..  ..::++**##</text>
    <text x="550" y="536">..          ..::++##@@  @@##++</text>
    <text x="550" y="552">;;==++**##%%@@ .*:;!=+*#%@  .</text>
  </g>

  <!-- Main title -->
  <g filter="url(#glow-strong)">
    <text x="600" y="240" text-anchor="middle" fill="#33ff33" font-family="monospace" font-weight="bold" font-size="96" letter-spacing="8">ASCII</text>
    <text x="600" y="330" text-anchor="middle" fill="#33ff33" font-family="monospace" font-weight="bold" font-size="96" letter-spacing="8">PLAYER</text>
  </g>

  <!-- Cursor blink -->
  <rect x="788" y="298" width="12" height="40" fill="#33ff33" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="600" y="385" text-anchor="middle" fill="#1a8a1a" font-family="monospace" font-size="22" letter-spacing="3">&gt; REAL-TIME VIDEO TO ASCII ART</text>

  <!-- Feature pills -->
  <g font-family="monospace" font-size="14" filter="url(#glow)">
    <rect x="255" y="410" width="100" height="28" fill="none" stroke="#33ff33" stroke-width="1" rx="3" opacity="0.6"/>
    <text x="305" y="429" text-anchor="middle" fill="#33ff33" opacity="0.8">WEBCAM</text>

    <rect x="375" y="410" width="80" height="28" fill="none" stroke="#33ff33" stroke-width="1" rx="3" opacity="0.6"/>
    <text x="415" y="429" text-anchor="middle" fill="#33ff33" opacity="0.8">CRT</text>

    <rect x="475" y="410" width="80" height="28" fill="none" stroke="#33ff33" stroke-width="1" rx="3" opacity="0.6"/>
    <text x="515" y="429" text-anchor="middle" fill="#33ff33" opacity="0.8">VHS</text>

    <rect x="575" y="410" width="100" height="28" fill="none" stroke="#33ff33" stroke-width="1" rx="3" opacity="0.6"/>
    <text x="625" y="429" text-anchor="middle" fill="#33ff33" opacity="0.8">MATRIX</text>

    <rect x="695" y="410" width="110" height="28" fill="none" stroke="#33ff33" stroke-width="1" rx="3" opacity="0.6"/>
    <text x="750" y="429" text-anchor="middle" fill="#33ff33" opacity="0.8">EFFECTS</text>

    <rect x="825" y="410" width="120" height="28" fill="none" stroke="#33ff33" stroke-width="1" rx="3" opacity="0.6"/>
    <text x="885" y="429" text-anchor="middle" fill="#33ff33" opacity="0.8">EXPORT</text>
  </g>

  <!-- Scanline overlay -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
